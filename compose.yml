services:
  searxng:
    image: ghcr.io/mfiferna/searxng-custom:latest
    container_name: searxng
    restart: unless-stopped
    environment:
      - SEARXNG_SECRET=${SEARXNG_SECRET}
    ports:
      - "14597:8080"  # LAN access
    networks:
      - searxng-net

networks:
  searxng-net:
    name: searxng-net
